<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-success text-white">
      <h3 class="mb-0">Emitir Nova Nota Fiscal</h3>
    </div>
    <div class="card-body">
      <form (ngSubmit)="salvar()" #notaForm="ngForm">
        
        <div class="mb-3">
          <label class="form-label">Número da Nota (Gerado)</label>
          <input type="text" class="form-control" [value]="nota.numeroSequencial" readonly>
        </div>

        <div class="mb-3">
          <label class="form-label">Produto</label>
          <select class="form-select" name="produtoId" [(ngModel)]="nota.itens[0].produtoId" required>
            <option [ngValue]="null" disabled>Selecione um produto do estoque...</option>
            <option *ngFor="let p of produtos" [ngValue]="p.id || p.Id">
              {{ p.descricao || p.Descricao }} (Saldo: {{ p.saldo || p.Saldo }})
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Quantidade</label>
          <input type="number" class="form-control" name="quantidade" 
                 [(ngModel)]="nota.itens[0].quantidade" min="1" required>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <button type="button" class="btn btn-secondary" routerLink="/notas">Cancelar</button>
          <button type="submit" class="btn btn-primary" [disabled]="!notaForm.form.valid">
            Emitir e Baixar Estoque
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
