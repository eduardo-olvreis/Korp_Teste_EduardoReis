<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      
      <div class="card shadow-sm border-0 rounded-3">
        
        <div class="card-header bg-pastel-info border-0 py-3">
          <h4 class="mb-0 fw-bold d-flex align-items-center gap-2" style="color: #1565c0;">
            <i class="bi bi-file-earmark-plus"></i>
            Emitir Nova Nota Fiscal
          </h4>
        </div>

        <div class="card-body p-4">
          <form (ngSubmit)="salvar()" #notaForm="ngForm">
            
            <div class="mb-4">
              <label class="form-label fw-semibold text-secondary">Produto</label>
              <select class="form-select form-select-lg border-2 shadow-none" 
                      style="border-color: #e3f2fd; font-size: 1rem;" 
                      name="produtoId" 
                      [(ngModel)]="nota.itens[0].produtoId" required>
                <option [ngValue]="null" disabled>Selecione um produto do estoque...</option>
                <option *ngFor="let p of produtos" [ngValue]="p.id || p.Id">
                  {{ p.descricao || p.Descricao }} (Saldo: {{ p.saldo || p.Saldo }})
                </option>
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold text-secondary">Quantidade</label>
              <input type="number" class="form-control form-control-lg border-2 shadow-none" 
                     style="border-color: #e3f2fd;" 
                     name="quantidade" 
                     [(ngModel)]="nota.itens[0].quantidade" 
                     min="1" required placeholder="Ex: 10">
            </div>

            <hr class="my-4 opacity-50">

            <div class="d-flex justify-content-end gap-3">
              <button type="button" class="btn btn-light px-4 fw-medium text-secondary border" 
                      routerLink="/notas">
                Cancelar
              </button>
              
              <button type="submit" class="btn btn-primary px-4 fw-bold shadow-sm" 
                      [disabled]="!notaForm.form.valid">
                <i class="bi bi-check-circle me-1"></i>
                Emitir
              </button>
            </div>
          </form>
        </div>

      </div>

      <p class="text-center mt-3 text-muted small">
        <i class="bi bi-info-circle me-1"></i>
        A emissão gerará uma nota com status <strong>Aberta</strong>.
      </p>

    </div>
  </div>
</div>
