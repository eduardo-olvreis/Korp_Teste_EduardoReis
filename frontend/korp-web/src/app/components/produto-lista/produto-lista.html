<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold text-dark mb-0">Controle de Estoque</h2>
      <small class="text-muted">Gerenciamento de produtos e saldos em tempo real</small>
    </div>
    <a routerLink="/produtos/novo" class="btn btn-success btn-lg shadow-sm d-flex align-items-center gap-2">
      <i class="bi bi-plus-circle"></i>
      Novo Produto
    </a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-0"> <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr>
              <th class="ps-4">Código</th>
              <th>Descrição</th>
              <th class="text-center pe-4">Saldo Disponível</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of produtos">
              <td class="ps-4 fw-bold text-primary">{{ p.codigo }}</td>
              <td>{{ p.descricao }}</td>
              <td class="text-center">
                <span class="badge-estoque" 
                      [ngClass]="{
                        'bg-pastel-success': p.saldo > 10,
                        'bg-pastel-warning': p.saldo > 0 && p.saldo <= 10,
                        'bg-pastel-danger': p.saldo === 0
                      }">
                  {{ p.saldo }} UNIDADES
                </span>
              </td>
            </tr>
            <tr *ngIf="produtos.length === 0">
              <td colspan="3" class="text-center py-5 text-muted">
                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                Nenhum produto encontrado no banco de dados.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
