<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-dark text-white d-flex align-items-center">
      <i class="bi bi-box-seam me-2"></i>
      <h3 class="mb-0">Novo Produto</h3>
    </div>
    <div class="card-body">
      <form (ngSubmit)="salvar()" #f="ngForm">
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Código</label>
            <input type="text" class="form-control" name="codigo" [(ngModel)]="produto.codigo" required placeholder="Ex: COD123">
          </div>
          <div class="col-md-8 mb-3">
            <label class="form-label">Descrição / Nome do Produto</label>
            <input type="text" class="form-control" name="descricao" [(ngModel)]="produto.descricao" required>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Preço Unitário (R$)</label>
            <input type="number" class="form-control" name="preco" [(ngModel)]="produto.preco" min="0">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Saldo Inicial em Estoque</label>
            <input type="number" class="form-control" name="saldo" [(ngModel)]="produto.saldo" min="0" required>
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-3">
          <button type="button" class="btn btn-secondary" routerLink="/produtos">Cancelar</button>
          <button type="submit" class="btn btn-primary" [disabled]="!f.valid">
            <i class="bi bi-save"></i> Salvar Produto
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
