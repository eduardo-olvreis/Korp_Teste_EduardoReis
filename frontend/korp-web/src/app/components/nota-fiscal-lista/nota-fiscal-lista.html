<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary"><i class="bi bi-file-earmark-text"></i> Notas Fiscais</h2>
    <a routerLink="/notas/nova" class="btn btn-success">
      <i class="bi bi-plus-circle"></i> Nova Nota Fiscal
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Nº Sequencial</th>
            <th>Qtd. Itens</th>
            <th>Status</th>
            <th class="text-center">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let n of notas">
            <td>{{ n.id }}</td>
            <td><strong>#{{ n.numeroSequencial }}</strong></td>
            <td>{{ n.itens?.length || 0 }} item(ns)</td>
            <td>
              <span class="badge" [ngClass]="n.status === 'Aberta' ? 'bg-warning text-dark' : 'bg-info'">
                {{ n.status }}
              </span>
            </td>
            <td class="text-center">
              <div class="d-flex justify-content-center gap-2">
                <button class="btn btn-sm btn-outline-primary" (click)="verDetalhes(n)" title="Ver Detalhes">
                  <i class="bi bi-search"></i> Ver
                </button>

                <button *ngIf="n.status === 'Aberta'" 
                        class="btn btn-sm btn-success" 
                        (click)="fecharNota(n)" 
                        title="Fechar Nota">
                  <i class="bi bi-check-lg"></i> Fechar
                </button>
              </div>
            </td>
          </tr>

          <tr *ngIf="notas.length === 0">
            <td colspan="5" class="text-center py-4 text-muted">
              Nenhuma nota fiscal encontrada.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
