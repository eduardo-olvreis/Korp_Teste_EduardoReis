<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold text-dark mb-0">Notas Fiscais</h2>
      <small class="text-muted">Gestão de emissões e finalização de faturamento</small>
    </div>
    <a routerLink="/notas/nova" class="btn btn-primary btn-lg shadow-sm d-flex align-items-center gap-2">
      <i class="bi bi-plus-circle"></i>
      Nova Nota Fiscal
    </a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr>
              <th class="ps-4">ID</th>
              <th>Nº SEQUENCIAL</th>
              <th>QTD. ITENS</th>
              <th class="text-center">STATUS</th>
              <th class="text-center pe-4">AÇÕES</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let n of notas">
              <td class="ps-4 text-muted">#{{ n.id }}</td>
              <td><span class="fw-bold">{{ n.numeroSequencial }}</span></td>
              <td>
                <span class="text-secondary">
                  <i class="bi bi-box-seam me-1"></i>
                  {{ n.itens?.length || 0 }} item(ns)
                </span>
              </td>
              <td class="text-center">
                <span class="badge rounded-pill px-3 py-2" 
                      [ngClass]="n.status === 'Aberta' ? 'badge-aberta' : 'badge-fechada'">
                  {{ n.status }}
                </span>
              </td>
              <td class="text-center pe-4">
                <div class="d-flex justify-content-center gap-2">
                  <button class="btn btn-sm btn-outline-secondary px-3" (click)="verDetalhes(n)" [disabled]="processandoId === n.id">
                    Ver
                  </button>
                  
                  <button *ngIf="n.status === 'Aberta'" 
                          class="btn btn-sm btn-success btn-imprimir d-flex align-items-center gap-1"
                          (click)="fecharNota(n)"
                          [disabled]="processandoId === n.id">
                    
                    <ng-container *ngIf="processandoId === n.id; else btnNormal">
                      <span class="spinner-border spinner-border-sm"></span>
                      Finalizando...
                    </ng-container>
                    
                    <ng-template #btnNormal>
                      <i class="bi bi-printer"></i> Imprimir
                    </ng-template>
                  </button>
                </div>
              </td>
            </tr>

            <tr *ngIf="notas.length === 0">
              <td colspan="5" class="text-center py-5 text-muted">
                <i class="bi bi-file-earmark-x fs-1 d-block mb-2"></i>
                Nenhuma nota fiscal encontrada.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
